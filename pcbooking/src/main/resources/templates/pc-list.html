<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Daftar PC</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/Main.css}" />
  </head>

  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div>
          <div class="brand">
            <div class="brand-icon"><i class="bi bi-pc-display"></i></div>
            <div>
              <p class="brand-label">Website</p>
              <h3>Peminjaman PC</h3>
            </div>
          </div>
          <nav class="nav-menu">
            <a th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a class="active" th:href="@{/pc}"><i class="bi bi-pc-display me-2"></i> Daftar PC</a>
            <a th:href="@{/booking}"><i class="bi bi-calendar-check me-2"></i> Booking</a>
            <a th:href="@{/history}"><i class="bi bi-clock-history me-2"></i> Riwayat</a>
            <hr style="border: 0; border-top: 3px solid rgb(255, 255, 255); margin: 10px 0" />
            <a th:href="@{/logout}" id="logoutBtn" class="logout-btn text-danger"> <i class="bi bi-box-arrow-right me-2"></i> Logout </a>
          </nav>
        </div>
        <div class="sidebar-footer">
          <p>Sistem Peminjaman PC</p>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <div>
              <p class="eyebrow">Inventory</p>

              <h2>Daftar Komputer</h2>
            </div>
          </div>
        </header>

        <section class="content-grid single-column">
          <div class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Available</p>
                <h3>Daftar Komputer Laboratorium</h3>
              </div>
            </div>

            <div class="pc-grid pc-list-grid">
              <div
                class="pc-card"
                th:each="pc : ${daftarPc}"
                th:classappend="${
                            pc.status.name() == 'TERSEDIA' ? ' available' :
                            (pc.status.name() == 'DIPINJAM' ? ' busy' : ' maintenance')
                         }"
              >
                <span class="pc-tag" th:text="${pc.status}"> TERSEDIA </span>

                <h4 th:text="${pc.kodePc}"></h4>

                <p th:text="${pc.namaPc}">Nama PC</p>

                <a th:href="@{/booking(kodePc=${pc.kodePc})}" class="btn btn-primary mt-3 w-100" th:if="${pc.status.name() == 'TERSEDIA'}"> Booking </a>

                <button class="btn btn-secondary mt-3 w-100" disabled th:unless="${pc.status.name() == 'TERSEDIA'}">Tidak Tersedia</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/javascript/pc-list.js}"></script>
  </body>
</html>
