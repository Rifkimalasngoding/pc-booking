<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Booking PC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div>
          <div class="brand">
            <div class="brand-icon"><i class="bi bi-pc-display"></i></div>
            <div>
              <p class="brand-label">Website</p>
              <h3>Peminjaman PC</h3>
            </div>
          </div>
          <nav class="nav-menu">
            <a th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a th:href="@{/pc}"><i class="bi bi-pc-display me-2"></i> Daftar PC</a>
            <a class="active" th:href="@{/booking}"><i class="bi bi-calendar-check me-2"></i> Booking</a>
            <a th:href="@{/history}"><i class="bi bi-clock-history me-2"></i> Riwayat</a>
            <hr style="border: 0; border-top: 3px solid rgb(255, 255, 255); margin: 10px 0" />
            <a th:href="@{/logout}" id="logoutBtn" class="logout-btn text-danger"> <i class="bi bi-box-arrow-right me-2"></i> Logout </a>
          </nav>
        </div>
        <div class="sidebar-footer">
          <p>Sistem Peminjaman PC</p>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left d-flex align-items-center gap-3">
            <div>
              <p class="eyebrow">Booking</p>
              <h2>Form Peminjaman</h2>
            </div>
          </div>
        </header>

        <section class="booking-grid">
          <div class="panel form-panel">
            <form id="bookingForm" th:action="@{/booking}" method="post">
              <input type="hidden" name="nim" id="nimField" th:value="${nim}" />
              <input type="hidden" name="durasiJam" id="durasiJam" />
              <div class="mb-4 p-3 rounded" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1)">
                <h5 class="mb-3 text-info">Detail PC Terpilih</h5>

                <div class="row">
                  <div class="col-md-4 mb-3">
                    <label class="fw-semibold">Kode PC</label>
                    <select id="kodePc" name="idPc" class="form-select">
                      <option th:each="pc : ${daftarPc}" th:value="${pc.idPc}" th:data-nama="${pc.namaPc}" th:data-lab="${pc.laboratorium.namaLab}" th:text="${pc.kodePc}" th:selected="${pc.kodePc == selectedKodePc}"></option>
                    </select>
                  </div>

                  <div class="col-md-4 mb-3">
                    <label class="fw-semibold">Nama PC</label>
                    <input type="text" id="namaPc" class="form-control" readonly />
                  </div>

                  <div class="col-md-4 mb-3">
                    <label class="fw-semibold">Laboratorium</label>
                    <input type="text" id="labPc" class="form-control" readonly />
                  </div>
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="fw-semibold" for="waktuMulai">Durasi Peminjaman</label>

                <div class="mb-3">
                  <label class="form-label text-secondary small" for="waktuMulai">Waktu Mulai</label>
                  <input type="datetime-local" id="waktuMulai" name="waktuMulai" class="form-control" required />
                </div>

                <div>
                  <label class="form-label text-secondary small" for="waktuSelesai">Waktu Selesai</label>
                  <input type="datetime-local" id="waktuSelesai" name="waktuSelesai" class="form-control" required />
                </div>
              </div>

              <div class="form-group">
                <label for="purpose">Keperluan</label>
                <textarea id="purpose" name="keperluan" rows="3" placeholder="(misal: mengerjakan tugas)" required></textarea>
              </div>

              <button class="btn-submit w-100 mt-3" type="submit">Pinjam PC Sekarang</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/javascript/booking.js}"></script>
  </body>
</html>
