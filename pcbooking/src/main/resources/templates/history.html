<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riwayat Peminjaman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div>
          <div class="brand">
            <div class="brand-icon"><i class="bi bi-pc-display"></i></div>
            <div>
              <p class="brand-label">Website</p>
              <h3>Peminjaman PC</h3>
            </div>
          </div>
          <nav class="nav-menu">
            <a th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a th:href="@{/pc}"><i class="bi bi-pc-display me-2"></i> Daftar PC</a>
            <a th:href="@{/booking}"><i class="bi bi-calendar-check me-2"></i> Booking</a>
            <a class="active" th:href="@{/history}"><i class="bi bi-clock-history me-2"></i> Riwayat</a>
            <hr style="border: 0; border-top: 3px solid rgb(255, 255, 255); margin: 10px 0" />
            <a th:href="@{/logout}" id="logoutBtn" class="logout-btn text-danger"> <i class="bi bi-box-arrow-right me-2"></i> Logout </a>
          </nav>
        </div>
        <div class="sidebar-footer">
          <p>Sistem Peminjaman PC</p>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left d-flex align-items-center gap-3">
            <div>
              <p class="eyebrow">History</p>
              <h2>Riwayat Peminjaman</h2>
            </div>
          </div>
        </header>

        <section class="panel table-panel">
          <div class="table-wrap overflow-auto">
            <table class="table table-borderless text-white mb-0 align-middle">
              <thead class="border-bottom border-secondary">
                <tr>
                  <th>Kode PC</th>
                  <th>Nama PC</th>
                  <th>Laboratorium</th>
                  <th>Mulai Pinjam</th>
                  <th>Selesai</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
           <tbody>

<tr th:each="history : ${historyList}">

    <td th:text="${history.pc.kodePc}"></td>

    <td th:text="${history.pc.namaPc}"></td>

    <td th:text="${history.pc.laboratorium != null ? history.pc.laboratorium.namaLab : '-'}"></td>

    <td th:text="${#temporals.format(history.waktuMulai,'dd MMM yyyy HH:mm')}"></td>

    <td th:text="${history.waktuSelesai != null ?
        #temporals.format(history.waktuSelesai,'dd MMM yyyy HH:mm')
        : '-'}">
    </td>

    <td>

        <span
            class="badge"

            th:classappend="${history.status.name() == 'AKTIF'} ?
            ' warning' : ' success'"

            th:text="${history.status.name() == 'AKTIF'} ?
            'Sedang Dipinjam' : 'Dikembalikan'">
        </span>

    </td>

    <td>

        <form
            th:if="${history.status.name() == 'AKTIF'}"
            th:action="@{/history/selesai/{id}(id=${history.idTransaksi})}"
            method="post">

            <button
                type="submit"
                class="btn btn-sm btn-success">

                Selesai

            </button>

        </form>

        <button
            th:unless="${history.status.name() == 'AKTIF'}"
            class="btn btn-sm btn-secondary"
            disabled>

            Selesai

        </button>

    </td>

</tr>

</tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/javascript/history.js}"></script>
  </body>
</html>
