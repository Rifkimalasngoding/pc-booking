spring.application.name=pcbooking

# createDatabaseIfNotExist=true -> database dibuat otomatis kalau belum ada
# useSSL=false & allowPublicKeyRetrieval=true -> hindari error koneksi umum di MySQL 8
# serverTimezone -> hindari error "server time zone value is unrecognized"
spring.datasource.url=jdbc:mysql://localhost:3306/pc_booking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
spring.datasource.username=pcbooking
spring.datasource.password=pcbooking123

# update -> Hibernate otomatis membuat/menyesuaikan tabel sesuai entity,
# jadi tidak perlu import skema SQL manual lagi
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Jalankan data.sql setiap start (aman karena pakai INSERT IGNORE),
# dan tunggu Hibernate selesai membuat tabel dulu (defer) sebelum data.sql dieksekusi
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.thymeleaf.cache=false
